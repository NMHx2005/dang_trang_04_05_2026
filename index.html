<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làng nhỏ 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 14px; left: 18px;
            color: #fff; font-size: 20px; font-weight: bold;
            text-shadow: 1px 2px 6px rgba(0,0,0,0.7);
            pointer-events: none;
        }
        #hint {
            position: absolute; bottom: 16px; width: 100%; text-align: center;
            color: #eee; font-size: 13px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="ui">🏡 Làng nhỏ 3D</div>
<div id="hint">Kéo để xoay · Cuộn để zoom · Chuột phải để dịch chuyển</div>

<script>
    // ============================================================
    // SETUP — scene, camera, renderer, controls
    // ============================================================
    const scene  = new THREE.Scene();
    const clock  = new THREE.Clock();
    let   sunDeg = 30;   // độ, tăng theo thời gian

    // Camera
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 400);
    camera.position.set(0, 24, 54);
    camera.lookAt(0, 3, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
    renderer.outputEncoding    = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // OrbitControls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.minDistance    = 8;
    controls.maxDistance    = 90;
    controls.maxPolarAngle  = Math.PI * 0.48;

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    // ============================================================
    // HELPERS
    // ============================================================
    function mat(hex, roughness = 0.82, metalness = 0) {
        return new THREE.MeshStandardMaterial({ color: hex, roughness, metalness });
    }

    function place(mesh, x, y, z, cast = true, receive = true) {
        mesh.position.set(x, y, z);
        if (cast)    mesh.castShadow    = true;
        if (receive) mesh.receiveShadow = true;
        scene.add(mesh);
        return mesh;
    }

    function shadowAll(group) {
        group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});
    }

    // ============================================================
    // LIGHTS
    // ============================================================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.08);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff1d0, 1.4);
    sunLight.castShadow              = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    sunLight.shadow.camera.left      = -42;
    sunLight.shadow.camera.right     =  42;
    sunLight.shadow.camera.top       =  42;
    sunLight.shadow.camera.bottom    = -42;
    sunLight.shadow.camera.near      = 0.5;
    sunLight.shadow.camera.far       = 100;
    sunLight.shadow.bias             = -0.0008;
    scene.add(sunLight);
    scene.add(sunLight.target);   // target stays at origin

    // Fog
    const fogColor = new THREE.Color(0x7acff5);
    scene.fog = new THREE.Fog(fogColor, 24, 62);

    // ============================================================
    // SKY SPHERE + STARS
    // ============================================================
    const skyMat    = new THREE.MeshBasicMaterial({ side: THREE.BackSide, color: 0x3a9fe8 });
    const skySphere = new THREE.Mesh(new THREE.SphereGeometry(200, 32, 16), skyMat);
    scene.add(skySphere);

    // Stars — 220 random points scattered on upper hemisphere
    const starPositions = [];
    for (let i = 0; i < 220; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(1 - Math.random() * 0.55);
        const r     = 140 + Math.random() * 40;
        starPositions.push(
            r * Math.sin(phi) * Math.cos(theta),
            Math.abs(r * Math.cos(phi)) + 8,
            r * Math.sin(phi) * Math.sin(theta)
        );
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, transparent: true, opacity: 0 });
    const stars   = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ============================================================
    // GROUND + DIRT PATCHES
    // ============================================================
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(64, 46), mat(0x3d8a1e, 0.92));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    [
        [-9, -7, 1.8, 1.4], [5, -8, 1.4, 1.2], [-6,  3, 1.5, 1.0],
        [ 8,  1, 1.2, 1.4], [-8,-14, 1.8, 1.2], [14, -6, 2.0, 1.5],
    ].forEach(([x, z, sx, sz]) => {
        const p = new THREE.Mesh(new THREE.PlaneGeometry(sx, sz), mat(0x7a5a30, 0.95));
        p.rotation.x = -Math.PI / 2;
        p.position.set(x, 0.01, z);
        p.receiveShadow = true;
        scene.add(p);
    });

    // ============================================================
    // ROAD + SHOULDERS + CENTER DASHES
    // ============================================================
    const road = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 46), mat(0x282828, 0.72));
    road.rotation.x = -Math.PI / 2;
    road.position.y = 0.015;
    road.receiveShadow = true;
    scene.add(road);

    [-1.72, 1.72].forEach(sx => {
        const sh = new THREE.Mesh(new THREE.PlaneGeometry(0.36, 46), mat(0x5a4830, 0.88));
        sh.rotation.x = -Math.PI / 2;
        sh.position.set(sx, 0.012, 0);
        sh.receiveShadow = true;
        scene.add(sh);
    });

    const dashMat = mat(0xeeeebb, 0.6);
    for (let z = -21; z < 22; z += 3) {
        const d = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 1.5), dashMat);
        d.rotation.x = -Math.PI / 2;
        d.position.set(0, 0.022, z);
        scene.add(d);
    }

    // ============================================================
    // MOUNTAINS (dark brown, z=-19)
    // ============================================================
    [
        { x: -28, h: 5.0, r: 7.0, sz: 0.46 },
        { x: -16, h: 7.2, r: 8.5, sz: 0.50 },
        { x:  -6, h: 9.0, r: 9.2, sz: 0.48 },
        { x:   4, h: 6.5, r: 8.2, sz: 0.52 },
        { x:  13, h: 8.5, r: 9.0, sz: 0.48 },
        { x:  23, h: 5.2, r: 7.4, sz: 0.46 },
    ].forEach(m => {
        const mtn = new THREE.Mesh(new THREE.ConeGeometry(m.r, m.h, 7), mat(0x3c2010, 0.95));
        mtn.position.set(m.x, m.h / 2, -19);
        mtn.scale.z = m.sz;
        mtn.castShadow    = true;
        mtn.receiveShadow = true;
        scene.add(mtn);
    });

    // ============================================================
    // LAKE (animated wave vertices)
    // ============================================================
    const shoreBase = new THREE.Mesh(new THREE.PlaneGeometry(6.2, 4.4), mat(0x4a90c8, 0.6));
    shoreBase.rotation.x = -Math.PI / 2;
    shoreBase.position.set(11, 0.014, 13);
    shoreBase.receiveShadow = true;
    scene.add(shoreBase);

    const lakeGeo = new THREE.PlaneGeometry(5, 3.4, 20, 14);
    const lakeMat = new THREE.MeshStandardMaterial({
        color: 0x1a72c0, roughness: 0.04, metalness: 0.18,
        transparent: true, opacity: 0.90,
    });
    const lakeMesh = new THREE.Mesh(lakeGeo, lakeMat);
    lakeMesh.rotation.x  = -Math.PI / 2;
    lakeMesh.position.set(11, 0.022, 13);
    lakeMesh.receiveShadow = true;
    scene.add(lakeMesh);
    const lakeBase = lakeGeo.attributes.position.array.slice(); // snapshot for wave animation

    // ============================================================
    // SUN MESH (glow + core)
    // ============================================================
    const sunGroup = new THREE.Group();
    sunGroup.add(new THREE.Mesh(
        new THREE.SphereGeometry(2.2, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xffd060, transparent: true, opacity: 0.52 })
    ));
    sunGroup.add(new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xffee10 })
    ));
    scene.add(sunGroup);

    // ============================================================
    // CLOUDS (sphere clusters, animated)
    // ============================================================
    const clouds = [];
    function createCloud(x, y, z, scale) {
        const group  = new THREE.Group();
        const cMat   = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.88 });
        for (let i = 0; i < 7; i++) {
            const s = new THREE.Mesh(
                new THREE.SphereGeometry((0.40 + (i % 3) * 0.16) * scale, 12, 8),
                cMat.clone()
            );
            s.position.set(
                (i - 3) * 0.50 * scale,
                Math.sin(i * 1.7) * 0.15 * scale,
                Math.cos(i)       * 0.12 * scale
            );
            group.add(s);
        }
        group.position.set(x, y, z);
        scene.add(group);
        clouds.push({ mesh: group, baseY: y, speed: 0.012 + clouds.length * 0.007, phase: clouds.length * 1.45 });
    }
    createCloud(-18, 16, -12, 2.8);
    createCloud(  5, 18, -14, 2.4);
    createCloud( 18, 15, -11, 2.0);

    // ============================================================
    // BIRDS (V-shape Line objects, animated flight)
    // ============================================================
    const birds = [];
    function createBird(startX, y, z, speed, phase) {
        const group  = new THREE.Group();
        const lMat   = new THREE.LineBasicMaterial({ color: 0x111118 });
        [[-1, 0, 0], [1, 0, 0]].forEach(tip => {
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, tip[0],tip[1],tip[2]], 3));
            group.add(new THREE.Line(geo, lMat.clone()));
        });
        group.position.set(startX, y, z);
        scene.add(group);
        birds.push({ mesh: group, startX, y, speed, phase });
    }
    createBird(-28, 17, -15, 0.050, 0.0);
    createBird(-18, 19, -13, 0.032, 1.3);
    createBird( -8, 16, -16, 0.058, 2.6);
    createBird(  2, 20, -14, 0.040, 0.8);
    createBird( 12, 18, -15, 0.044, 1.9);
    createBird( 22, 15, -13, 0.046, 3.2);

    // ============================================================
    // HOUSES (5 nhà với màu mái khác nhau)
    // ============================================================
    function createHouse(x, z, roofHex, scaleXZ, scaleY, rotYDeg) {
        const group  = new THREE.Group();
        const wallM  = mat(0xf2e5ca, 0.82);
        const roofM  = mat(roofHex,  0.72);
        const chiM   = mat(0x8a2810, 0.88);
        const doorM  = mat(0x5a2c10, 0.85);
        const glassM = new THREE.MeshStandardMaterial({
            color: 0x88ccff, roughness: 0.08, metalness: 0.05,
            transparent: true, opacity: 0.76,
        });
        const frameM = mat(0x4a3010, 0.85);

        // Walls
        const wall = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), wallM);
        wall.position.y = 1.25;
        group.add(wall);

        // Pyramid roof (4-sided cone)
        const roof = new THREE.Mesh(new THREE.ConeGeometry(2.3, 1.9, 4), roofM);
        roof.position.y = 3.45;
        roof.rotation.y = Math.PI / 4;
        group.add(roof);

        // Chimney
        const chi = new THREE.Mesh(new THREE.BoxGeometry(0.38, 1.25, 0.38), chiM);
        chi.position.set(0.72, 3.55, 0);
        group.add(chi);

        // Door
        const door = new THREE.Mesh(new THREE.BoxGeometry(0.68, 1.25, 0.06), doorM);
        door.position.set(0, 0.625, 1.535);
        group.add(door);

        // Door knob
        const knob = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), mat(0xc89a20, 0.4, 0.5));
        knob.position.set(0.24, 0.62, 1.565);
        group.add(knob);

        // Step
        const step = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.09, 0.54), mat(0x9a8870, 0.88));
        step.position.set(0, 0.045, 1.78);
        group.add(step);

        // Front windows (2)
        [[-0.88, 1.48], [0.88, 1.48]].forEach(([wx, wy]) => {
            const fr = new THREE.Mesh(new THREE.BoxGeometry(0.60, 0.60, 0.07), frameM);
            fr.position.set(wx, wy, 1.518);
            group.add(fr);
            const gl = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.48, 0.07), glassM.clone());
            gl.position.set(wx, wy, 1.522);
            group.add(gl);
        });

        // Side window (left wall)
        const sfr = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.56, 0.56), frameM);
        sfr.position.set(-1.518, 1.4, 0);
        group.add(sfr);
        const sgl = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.44, 0.44), glassM.clone());
        sgl.position.set(-1.523, 1.4, 0);
        group.add(sgl);

        shadowAll(group);
        group.position.set(x, 0, z);
        group.rotation.y = rotYDeg * Math.PI / 180;
        group.scale.set(scaleXZ, scaleY, scaleXZ);
        scene.add(group);
    }

    createHouse(-8, -5, 0xc84f1e, 1.00, 1.00,   0);  // brick red
    createHouse( 4, -6, 0x1060b8, 0.90, 1.28,  25);  // sea blue, tall
    createHouse(-5,  5, 0xb38a30, 1.12, 0.88, -20);  // gold, wide
    createHouse( 7,  3, 0x993d22, 0.88, 1.15,  40);  // dark red, slim
    createHouse(-7,-12, 0x7a4a90, 1.00, 0.92,   0);  // purple

    // ============================================================
    // TREES (7 cây, 3-tier foliage cones)
    // ============================================================
    function createTree(x, z, scale) {
        const g = new THREE.Group();

        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.18 * scale, 0.26 * scale, 2.2 * scale, 8),
            mat(0x6a3c10, 0.92)
        );
        trunk.position.y = 1.1 * scale;
        g.add(trunk);

        [[1.8, 2.2, 2.5, 0x1a7a20], [1.3, 1.8, 3.8, 0x157018], [0.85, 1.5, 5.0, 0x106012]]
        .forEach(([r, h, y, c]) => {
            const cone = new THREE.Mesh(new THREE.ConeGeometry(r * scale, h * scale, 8), mat(c, 0.92));
            cone.position.y = y * scale;
            g.add(cone);
        });

        shadowAll(g);
        g.position.set(x, 0, z);
        scene.add(g);
    }

    createTree(-12,  0, 1.00);
    createTree(  5,  8, 1.30);
    createTree( 10, -4, 0.82);
    createTree( -3,  9, 1.10);
    createTree( 11,  7, 1.38);
    createTree(-10, -9, 0.90);
    createTree(  6, -9, 1.20);

    // ============================================================
    // WINDMILL
    // ============================================================
    let bladeGroup = null;
    (function createWindmill() {
        const g = new THREE.Group();

        // Tower (slightly tapered cylinder)
        const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.58, 6.5, 10), mat(0xc8c0a8, 0.80));
        tower.position.y = 3.25;
        g.add(tower);

        // Blades
        const blades = new THREE.Group();
        blades.position.set(0, 6.6, 0.45);
        for (let i = 0; i < 3; i++) {
            const pivot = new THREE.Group();
            pivot.rotation.z = i * (Math.PI * 2 / 3);
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.28, 2.6, 0.07), mat(0xe8e0d0, 0.7));
            blade.position.y = 1.3;
            pivot.add(blade);
            blades.add(pivot);
        }
        // Hub
        blades.add(new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 8), mat(0x888880, 0.6)));
        g.add(blades);
        bladeGroup = blades;

        shadowAll(g);
        g.position.set(-11, 0, 6);
        scene.add(g);
    })();

    // ============================================================
    // FENCE (posts + rails along both sides of road)
    // ============================================================
    (function createFence() {
        const postM = mat(0x8a6030, 0.88);
        const railM = mat(0x7a5528, 0.85);
        [-2.2, 2.2].forEach(sx => {
            // Posts every 1.5 units
            for (let z = -15; z <= 15; z += 1.5) {
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.95, 0.12), postM);
                post.position.set(sx, 0.475, z);
                post.castShadow = true; post.receiveShadow = true;
                scene.add(post);
                // Pointed tip
                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.088, 0.20, 4), postM);
                tip.position.set(sx, 1.05, z);
                tip.rotation.y = Math.PI / 4;
                scene.add(tip);
            }
            // Two horizontal rails
            [0.30, 0.65].forEach(ry => {
                const rail = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 31), railM);
                rail.position.set(sx, ry, 0);
                rail.castShadow = true;
                scene.add(rail);
            });
        });
    })();

    // ============================================================
    // LAMP POSTS (8 pairs, glow at night)
    // ============================================================
    const lampBulbMats   = [];
    const lampPtLights   = [];
    (function createLampPosts() {
        const lampZList = [-14, -10, -6, -2, 2, 6, 10, 14];
        [[-2.8, -1], [2.8, 1]].forEach(pair => {
            const sx = pair[0], dir = pair[1];
            lampZList.forEach(lz => {
                const g = new THREE.Group();

                // Pole
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.055, 4.2, 8), mat(0x4a4f58, 0.7));
                pole.position.y = 2.1;
                g.add(pole);

                // Arm
                const arm = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.05, 0.05), mat(0x4a4f58, 0.7));
                arm.position.set(dir * 0.325, 4.25, 0);
                g.add(arm);

                // Fixture
                const fix = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.12, 0.22, 8), mat(0x3a3f44, 0.6));
                fix.position.set(dir * 0.62, 4.16, 0);
                g.add(fix);

                // Bulb (emissive material)
                const bulbMat = new THREE.MeshStandardMaterial({
                    color: 0xffcc44,
                    emissive: new THREE.Color(0xff8800),
                    emissiveIntensity: 0,
                });
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8), bulbMat);
                bulb.position.set(dir * 0.62, 4.05, 0);
                g.add(bulb);
                lampBulbMats.push(bulbMat);

                // PointLight follows each lamp
                const ptL = new THREE.PointLight(0xffaa44, 0, 10);
                ptL.position.set(sx + dir * 0.62, 4.05, lz);
                scene.add(ptL);
                lampPtLights.push(ptL);

                g.position.set(sx, 0, lz);
                shadowAll(g);
                scene.add(g);
            });
        });
    })();

    // ============================================================
    // MOVING CAR (drives north↔south on left lane)
    // ============================================================
    const carHeadMats = [];
    let   carGroup    = null;
    (function createCar() {
        carGroup = new THREE.Group();
        const bodyM  = mat(0xcc1a14, 0.55);
        const cabinM = mat(0xaa1410, 0.60);
        const darkM  = mat(0x1a1a1e, 0.85);
        const glassM = new THREE.MeshStandardMaterial({
            color: 0x88ccee, roughness: 0.08, transparent: true, opacity: 0.72,
        });

        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.76, 0.44, 1.44), bodyM);
        body.position.y = 0.32;
        carGroup.add(body);

        // Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.64, 0.35, 0.88), cabinM);
        cabin.position.set(0, 0.74, 0.10);
        carGroup.add(cabin);

        // Windshield
        const ws = new THREE.Mesh(new THREE.BoxGeometry(0.60, 0.30, 0.04), glassM);
        ws.position.set(0, 0.74, -0.34);
        carGroup.add(ws);

        // Rear window
        const rw = new THREE.Mesh(new THREE.BoxGeometry(0.60, 0.28, 0.04), glassM.clone());
        rw.position.set(0, 0.74, 0.55);
        carGroup.add(rw);

        // Wheels
        const wGeo = new THREE.CylinderGeometry(0.16, 0.16, 0.10, 12);
        [[-0.40, -0.50], [-0.40, 0.48], [0.40, -0.50], [0.40, 0.48]].forEach(([wx, wz]) => {
            const w = new THREE.Mesh(wGeo, darkM);
            w.rotation.z = Math.PI / 2;
            w.position.set(wx, 0.16, wz);
            carGroup.add(w);
        });

        // Headlights
        [-0.22, 0.22].forEach(hx => {
            const hm = new THREE.MeshBasicMaterial({ color: 0xfffaaa });
            const hl = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.09, 0.025), hm);
            hl.position.set(hx, 0.30, -0.73);
            carGroup.add(hl);
            carHeadMats.push(hm);
        });

        // Taillights
        [-0.24, 0.24].forEach(hx => {
            const tl = new THREE.Mesh(
                new THREE.BoxGeometry(0.10, 0.07, 0.02),
                new THREE.MeshBasicMaterial({ color: 0x440000 })
            );
            tl.position.set(hx, 0.30, 0.73);
            carGroup.add(tl);
        });

        shadowAll(carGroup);
        carGroup.position.set(-0.6, 0, -18);
        scene.add(carGroup);
    })();

    // ============================================================
    // PEOPLE (2 nhân vật đứng gần cổng)
    // ============================================================
    const personGroups = [];
    function createPerson(x, z, shirtHex, pantsHex, rotY) {
        const g      = new THREE.Group();
        const skinM  = mat(0xffe0b0, 0.80);
        const shirtM = mat(shirtHex, 0.80);
        const pantsM = mat(pantsHex, 0.85);
        const hairM  = mat(0x100800, 0.88);
        const shoeM  = mat(0x180f08, 0.90);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 12), skinM);
        head.position.y = 1.60;
        g.add(head);

        // Hair (half-sphere cap)
        const hair = new THREE.Mesh(
            new THREE.SphereGeometry(0.235, 16, 12, 0, Math.PI * 2, 0, Math.PI / 1.8),
            hairM
        );
        hair.position.y = 1.60;
        g.add(hair);

        // Body
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.18, 0.58, 10), shirtM);
        body.position.y = 1.07;
        g.add(body);

        // Arms
        [[-0.22, 0.22], [0.22, -0.22]].forEach(([ax, rz]) => {
            const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.058, 0.058, 0.46, 8), shirtM);
            arm.position.set(ax, 1.06, 0);
            arm.rotation.z = rz * 0.22 / 0.22;
            g.add(arm);
        });

        // Legs + shoes
        [-0.10, 0.10].forEach(lx => {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.52, 8), pantsM);
            leg.position.set(lx, 0.55, 0);
            g.add(leg);
            const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.10, 0.22), shoeM);
            shoe.position.set(lx, 0.28, 0.04);
            g.add(shoe);
        });

        shadowAll(g);
        g.position.set(x, 0, z);
        g.rotation.y = rotY;
        scene.add(g);
        personGroups.push(g);
    }

    createPerson(-0.8, 10.5, 0x3366cc, 0x224488,  0.20);  // blue shirt
    createPerson(-2.2, 11.2, 0xdd4499, 0xffcc00, -0.30);  // pink shirt

    // ============================================================
    // ANIMATE LOOP
    // ============================================================
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();

        // Full day cycle = 120 seconds
        sunDeg = (time * 3.0) % 360;
        const t = Math.max(0, Math.sin(sunDeg * Math.PI / 180)); // 0=night, 1=noon

        updateDayNight(t);
        updateSun(t);
        updateClouds(time, t);
        updateBirds(time, t);
        updateCar(time);
        updateLake(time);

        // Windmill blades
        if (bladeGroup) bladeGroup.rotation.z += 0.022;

        // People idle bob
        personGroups.forEach((p, i) => {
            p.position.y = Math.sin(time * 1.4 + i * 0.9) * 0.04;
        });

        controls.update();
        renderer.render(scene, camera);
    }

    // ---- Day/Night ----
    function updateDayNight(t) {
        // Sky sphere gradient (night: deep navy → day: bright blue)
        skyMat.color.setRGB(0.02 + 0.22 * t, 0.04 + 0.56 * t, 0.10 + 0.80 * t);

        // Ambient light
        ambientLight.intensity = 0.07 + 0.68 * t;
        ambientLight.color.setRGB(0.50 + 0.50 * t, 0.60 + 0.40 * t, 0.90 + 0.10 * t);

        // Fog color matches sky horizon
        scene.fog.color.setRGB(0.05 + 0.44 * t, 0.08 + 0.72 * t, 0.12 + 0.76 * t);

        // Stars fade in at night
        starMat.opacity = Math.max(0, 1.0 - t * 4.2);

        // Lamp posts: glow when dark (t < ~0.25)
        const lampT = Math.max(0, 1.0 - t * 4.5);
        lampBulbMats.forEach(m => { m.emissiveIntensity = lampT * 1.8; });
        lampPtLights.forEach(l  => { l.intensity          = lampT * 1.2; });

        // Car headlights on at dusk/night
        carHeadMats.forEach(m => { m.color.setHex(t < 0.35 ? 0xfff8cc : 0x887040); });
    }

    // ---- Sun position + light ----
    function updateSun(t) {
        const rad = sunDeg * Math.PI / 180;
        const sx  = 28 * Math.cos(rad);
        const sy  = 28 * Math.sin(rad);

        sunGroup.position.set(sx, sy, -19.5);
        sunGroup.visible = sy > 0;

        // DirectionalLight chases sun across the sky
        sunLight.position.set(sx, Math.max(1, sy), 14);
        sunLight.intensity = Math.max(0, t) * 1.45;
        // Warm orange at sunrise/sunset, white at noon
        const warm = t * t; // extra warm transition
        sunLight.color.setRGB(1.0, 0.88 + 0.12 * warm, 0.60 + 0.40 * warm);
    }

    // ---- Cloud drift + night tinting ----
    function updateClouds(time, t) {
        const cR = 0.18 + 0.82 * t, cG = 0.18 + 0.78 * t, cB = 0.22 + 0.74 * t;
        clouds.forEach(c => {
            c.mesh.position.x += c.speed;
            c.mesh.position.y  = c.baseY + Math.sin(time * 0.28 + c.phase) * 0.45;
            if (c.mesh.position.x > 44) c.mesh.position.x = -44;
            c.mesh.children.forEach(s => s.material.color.setRGB(cR, cG, cB));
        });
    }

    // ---- Bird flight + wing flap ----
    function updateBirds(time, t) {
        const vis = t > 0.12;
        birds.forEach(b => {
            b.mesh.visible = vis;
            if (!vis) return;
            const bx = b.startX + time * b.speed * 60;
            b.mesh.position.x = ((bx + 30) % 60) - 30;
            b.mesh.position.y = b.y + Math.sin(time * 0.14 + b.phase) * 0.5;
            const wf = Math.sin(time * 3.5 + b.phase) * 0.44;
            b.mesh.children.forEach(line => {
                const pos = line.geometry.attributes.position;
                pos.setY(1, wf);
                pos.needsUpdate = true;
            });
        });
    }

    // ---- Car drives back and forth on road ----
    function updateCar(time) {
        const period = 8.0;
        const cycle  = time % (period * 2);
        let cz;
        if (cycle < period) {
            cz = -18 + (cycle / period) * 36;
            carGroup.rotation.y = 0;
        } else {
            cz = 18 - ((cycle - period) / period) * 36;
            carGroup.rotation.y = Math.PI;
        }
        carGroup.position.z = cz;
    }

    // ---- Lake wave vertex animation ----
    function updateLake(time) {
        const pos  = lakeGeo.attributes.position;
        const base = lakeBase;
        for (let i = 0; i < pos.count; i++) {
            const lx = base[i * 3], ly = base[i * 3 + 1];
            const w  = Math.sin(lx * 0.85 + time * 1.3) * 0.022
                     + Math.cos(ly * 0.90 + time * 0.95) * 0.016;
            pos.setZ(i, w);
        }
        pos.needsUpdate = true;
        lakeGeo.computeVertexNormals();
    }

    animate();
</script>
